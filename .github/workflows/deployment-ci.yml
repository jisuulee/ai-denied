name: Deployment CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Develop/K3s/manifests/**'  # 매니페스트 파일 변경 시 트리거
  workflow_dispatch: 

jobs:
  frontend-rebuild:
    name: Frontend Build and Push (Manifest Trigger)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 빌더(Buildx) 세팅
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 2. Harbor 로그인
      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      # 3. .env 파일 생성
      - name: Create .env file for Frontend
        run: |
          echo "${{ secrets.FRONTEND_ENV }}" > ./Develop/Frontend/.env

      # 4. 이미지 빌드 및 푸시
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./Develop/Frontend
          file: ./Develop/Frontend/Dockerfile
          push: true
          tags: ${{ secrets.HARBOR_URL }}/agami/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 필요하다면 여기에 Backend 리빌드 Job도 추가하여 통합 관리할 수 있습니다.
