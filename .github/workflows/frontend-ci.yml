name: Frontend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Develop/Frontend/**'
  workflow_dispatch: 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }} # workflow 권한이 있는 토큰 필요

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Create .env file for Frontend
        run: |
          echo "${{ secrets.FRONTEND_ENV }}" > ./Develop/Frontend/.env

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./Develop/Frontend
          file: ./Develop/Frontend/Dockerfile
          push: true
          tags: ${{ secrets.HARBOR_URL }}/agami/frontend:v1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # [핵심 추가] 매니페스트 업데이트로 ArgoCD 트리거
      - name: Update manifest to trigger ArgoCD
        run: |
          # 파일 마지막에 배포 시간을 주석으로 달아 변경 사항 발생 시킴
          sed -i "/# Last Deploy:/d" ./Develop/K3s/manifests/total-deploy.yml
          echo "# Last Deploy: $(date +'%Y-%m-%d %H:%M:%S')" >> ./Develop/K3s/manifests/total-deploy.yml
          
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add ./Develop/K3s/manifests/total-deploy.yml
          git commit -m "chore: trigger deployment by updating manifest [skip ci]"
          git push