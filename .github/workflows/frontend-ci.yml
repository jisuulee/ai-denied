name: Frontend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Develop/Frontend/**'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # [교정] 별도 시크릿 설정 없이 기본 토큰을 사용하여 권한 에러 방지
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Create .env file for Frontend
        run: |
          echo "${{ secrets.FRONTEND_ENV }}" > ./Develop/Frontend/.env
          ls -al ./Develop/Frontend/.env

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./Develop/Frontend
          file: ./Develop/Frontend/Dockerfile
          push: true
          tags: ${{ secrets.HARBOR_URL }}/agami/frontend:v1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # [추가] 매니페스트 파일을 갱신하여 ArgoCD가 배포를 인지하게 만듦
      - name: Update manifest to trigger ArgoCD
        run: |
          # 배포 시간 주석 추가 (파일이 변해야 ArgoCD가 작동함)
          echo "# Last Deploy: $(date +'%Y-%m-%d %H:%M:%S')" >> ./Develop/K3s/manifests/total-deploy.yml
          
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add ./Develop/K3s/manifests/total-deploy.yml
          git commit -m "chore: auto-update manifest for deployment [skip ci]"
          git pushname: Frontend CI

