name: Backend CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Develop/Backend/**'
      - 'Develop/K3s/manifests/backend-deployment.yaml'
  workflow_dispatch: 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Create .env
        run: echo "${{ secrets.BACKEND_ENV }}" > ./Develop/Backend/.env

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./Develop/Backend
          file: ./Develop/Backend/Dockerfile
          push: true
          tags: ${{ secrets.HARBOR_URL }}/agami/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # K3s 서버에 접속하여 백엔드 매니페스트만 적용 및 재시작
      - name: Deploy to K3s Cluster
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /path/to/your/repository/Develop/K3s/manifests
            git pull origin main
            kubectl apply -f backend-deployment.yaml
            kubectl rollout restart deployment/agami-backend