# ==========================================
# 1. 백엔드 배포 (10.3.5.10 노드)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agami-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agami-backend
  template:
    metadata:
      labels:
        app: agami-backend
    spec:
      nodeSelector:
        zone: backend
      containers:
      - name: backend
        image: agami-captcha.cloud:8443/agami/backend:v1
        imagePullPolicy: Always
        # [교정] Dockerfile의 CMD를 신뢰하기 위해 command/args 삭제
        ports:
        - containerPort: 8000
        env:
        - name: DB_HOST
          value: "postgres-db-postgresql"
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          value: "admin"
        - name: DB_PASSWORD
          value: "admin1234"
        - name: DB_NAME
          value: "agamidb"
        - name: KAKAO_REDIRECT_URI
          value: "https://agami-captcha.cloud/auth/kakao/callback"
---
apiVersion: v1
kind: Service
metadata:
  name: agami-backend-svc
spec:
  selector:
    app: agami-backend
  ports:
    - port: 80
      targetPort: 8000
---
# ==========================================
# 2. 프론트엔드 배포 (10.3.4.10 노드)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agami-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agami-frontend
  template:
    metadata:
      labels:
        app: agami-frontend
    spec:
      nodeSelector:
        zone: frontend
      containers:
      - name: frontend
        image: agami-captcha.cloud:8443/agami/frontend:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: agami-frontend-svc
spec:
  selector:
    app: agami-frontend
  ports:
    - port: 80
---
# ==========================================
# 3. 통합 인그레스 (Ingress)
# ==========================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agami-ingress
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  tls:
  - hosts:
    - agami-captcha.cloud
    secretName: agami-web-tls
  rules:
  - host: agami-captcha.cloud
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: agami-backend-svc
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: agami-frontend-svc
            port:
              number: 80

